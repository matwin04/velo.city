<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VeloCity — Bike Share Data Explorer</title>
		<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
		<link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				height: 100%;
				font-family: sans-serif;
				overflow: hidden;
				background: #fff;
			}

			#app {
				display: flex;
				flex-direction: column;
				height: 100vh;
			}

			/* ── Header ── */
			#header {
				padding: 10px 16px 8px;
				border-bottom: 1px solid #e8e8e8;
				flex-shrink: 0;
				display: flex;
				align-items: center;
				gap: 10px;
			}
			#header h1 {
				font-size: 20px;
				font-weight: 700;
			}
			#header p {
				font-size: 13px;
				color: #999;
				flex: 1;
			}

			/* ── Legend ── */
			#legend {
				display: flex;
				align-items: center;
				gap: 14px;
				flex-shrink: 0;
			}
			.legend-item {
				display: flex;
				align-items: center;
				gap: 5px;
				font-size: 12px;
				color: #555;
				cursor: pointer;
				user-select: none;
			}
			.legend-dot {
				width: 12px;
				height: 12px;
				border-radius: 50%;
				border: 2px solid rgba(0,0,0,0.15);
				flex-shrink: 0;
				transition: opacity 0.2s;
			}
			.legend-item.hidden .legend-dot {
				opacity: 0.35;
			}
			.legend-item.hidden span {
				color: #bbb;
			}

			/* ── Body: map + panel side by side on desktop ── */
			#body {
				display: flex;
				flex: 1;
				overflow: hidden;
			}

			/* ── Side panel (left on desktop) ── */
			#sidepanel {
				width: 280px;
				flex-shrink: 0;
				border-right: 1px solid #e8e8e8;
				display: flex;
				flex-direction: column;
				background: #fff;
				overflow: hidden;
				transition: width 0.25s ease;
			}

			#map {
				flex: 1;
				height: 100%;
			}

			/* ── Panel inner ── */
			#panel-header {
				padding: 14px 14px 10px;
				border-bottom: 1px solid #f0f0f0;
				display: none;
				align-items: flex-start;
				gap: 8px;
			}
			#panel-header-text {
				flex: 1;
				min-width: 0;
			}
			#panel-name {
				font-size: 14px;
				font-weight: 600;
				word-break: break-word;
				line-height: 1.3;
				color: #111;
			}
			#panel-id {
				font-size: 11px;
				color: #bbb;
				margin-top: 2px;
			}
			.panel-badge {
				display: inline-block;
				font-size: 10px;
				font-weight: 600;
				padding: 2px 6px;
				border-radius: 4px;
				margin-top: 4px;
				text-transform: uppercase;
				letter-spacing: 0.4px;
			}
			.panel-badge.metro {
				background: #e8f7f2;
				color: #1D9E75;
			}
			.panel-badge.veoride {
				background: #eef0ff;
				color: #5B67E8;
			}
			#panel-close {
				background: none;
				border: none;
				cursor: pointer;
				font-size: 17px;
				color: #bbb;
				padding: 0;
				line-height: 1;
				flex-shrink: 0;
			}
			#panel-close:hover {
				color: #444;
			}

			#panel-body {
				padding: 14px;
				overflow-y: auto;
				flex: 1;
			}

			#panel-empty {
				padding: 40px 16px;
				text-align: center;
				color: #ccc;
				font-size: 13px;
				line-height: 1.6;
			}
			#panel-empty .icon {
				font-size: 30px;
				margin-bottom: 8px;
			}

			.stat-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 8px;
				margin-bottom: 14px;
			}
			.stat-card {
				background: #f7f9f8;
				border-radius: 8px;
				padding: 10px 12px;
			}
			.stat-label {
				font-size: 10px;
				color: #999;
				margin-bottom: 3px;
				text-transform: uppercase;
				letter-spacing: 0.4px;
			}
			.stat-value {
				font-size: 24px;
				font-weight: 700;
				color: #1d9e75;
			}
			.stat-value.docks {
				color: #378add;
			}
			.stat-value.purple {
				color: #5B67E8;
			}

			.detail-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				font-size: 12px;
				padding: 7px 0;
				border-bottom: 1px solid #f4f4f4;
				color: #777;
			}
			.detail-row:last-child {
				border-bottom: none;
			}
			.detail-row span:last-child {
				font-weight: 500;
				color: #222;
			}

			#status-bar {
				padding: 5px 12px;
				font-size: 11px;
				color: #bbb;
				border-top: 1px solid #f0f0f0;
				flex-shrink: 0;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			/* ════════════════════════════════════════
         MOBILE / BOTTOM SHEET  (≤ 640px)
         ════════════════════════════════════════ */
			@media (max-width: 640px) {
				#header {
					flex-wrap: wrap;
					gap: 6px;
				}
				#legend {
					width: 100%;
					gap: 10px;
				}
				#body {
					flex-direction: column;
				}

				#sidepanel {
					width: 100%;
					border-right: none;
					border-top: 1px solid #e8e8e8;
					height: 48px;
					transition: height 0.3s ease;
					flex-shrink: 0;
					order: 2;
				}

				#sidepanel.open {
					height: 52vh;
				}

				#map {
					order: 1;
					flex: 1;
					height: auto;
				}

				#panel-header {
					padding: 10px 14px 8px !important;
					cursor: pointer;
				}

				#panel-header::before {
					content: "";
					display: block;
					width: 36px;
					height: 4px;
					background: #ddd;
					border-radius: 2px;
					margin: 0 auto 8px;
					flex-shrink: 0;
				}

				#panel-header {
					flex-direction: column;
				}
				#panel-header-inner {
					display: flex;
					align-items: flex-start;
					gap: 8px;
					width: 100%;
				}

				#panel-header {
					display: flex !important;
				}

				#panel-body {
					display: none;
				}
				#sidepanel.open #panel-body {
					display: block;
				}
				#status-bar {
					display: none;
				}
				#sidepanel.open #status-bar {
					display: block;
				}
			}
		</style>
	</head>
	<body>
		<div id="app">
			<div id="header">
				<h1>VeloCity</h1>
				<p>LA Bike Share</p>
				<div id="legend">
					<div class="legend-item" id="toggle-metro" onclick="toggleLayer('metro')">
						<div class="legend-dot" style="background:#1D9E75;"></div>
						<span>LA Metro Bike Share</span>
					</div>
					<div class="legend-item" id="toggle-veoride" onclick="toggleLayer('veoride')">
						<div class="legend-dot" style="background:#5B67E8;"></div>
						<span>VeoRide (XLA)</span>
					</div>
				</div>
			</div>
			<div id="body">
				<div id="sidepanel">
					<div id="panel-header">
						<div
							id="panel-header-inner"
							style="display: flex; align-items: flex-start; gap: 8px; width: 100%">
							<div id="panel-header-text" style="flex: 1; min-width: 0">
								<div id="panel-name">Tap a station</div>
								<div id="panel-id"></div>
							</div>
							<button id="panel-close" title="Close" style="display: none">✕</button>
						</div>
					</div>
					<div id="panel-body">
						<div id="panel-empty">
							<div class="icon">🚲</div>
							Click a station or bike<br />on the map to see details
						</div>
						<div id="panel-content" style="display: none"></div>
					</div>
					<div id="status-bar">Loading…</div>
				</div>

				<div id="map"></div>
			</div>
		</div>

		<script>
			const isMobile = () => window.innerWidth <= 640;

			const panel = document.getElementById("sidepanel");
			const panelHeader = document.getElementById("panel-header");
			const panelClose = document.getElementById("panel-close");
			const panelEmpty = document.getElementById("panel-empty");
			const panelContent = document.getElementById("panel-content");
			const panelName = document.getElementById("panel-name");
			const panelId = document.getElementById("panel-id");

			panelHeader.addEventListener("click", (e) => {
				if (!isMobile()) return;
				if (e.target === panelClose) return;
				panel.classList.toggle("open");
			});

			panelClose.addEventListener("click", (e) => {
				e.stopPropagation();
				closePanel();
			});

			let selectedId = null;
			let selectedSystem = null; // 'metro' | 'veoride'
			let metroFeatures = [];
			let veoFeatures = [];

			const layerVisible = { metro: true, veoride: true };

			function toggleLayer(sys) {
				layerVisible[sys] = !layerVisible[sys];
				const toggle = document.getElementById("toggle-" + sys);
				toggle.classList.toggle("hidden", !layerVisible[sys]);
				const layerId = sys === "metro" ? "station-circles" : "veo-circles";
				if (map.getLayer(layerId)) {
					map.setLayoutProperty(layerId, "visibility", layerVisible[sys] ? "visible" : "none");
				}
			}

			function showMetroStation(props) {
				selectedId = props.station_id;
				selectedSystem = "metro";
				panelClose.style.display = "block";
				panelEmpty.style.display = "none";
				panelContent.style.display = "block";

				panelName.textContent = props.name;
				panelId.innerHTML = `ID: ${props.station_id} <span class="panel-badge metro">Metro Bike</span>`;

				panelContent.innerHTML = `
					<div class="stat-grid">
						<div class="stat-card">
							<div class="stat-label">Bikes</div>
							<div class="stat-value">${props.bikes}</div>
						</div>
						<div class="stat-card">
							<div class="stat-label">Docks</div>
							<div class="stat-value docks">${props.docks}</div>
						</div>
					</div>
					<div>
						<div class="detail-row"><span>Capacity</span><span>${props.capacity}</span></div>
						<div class="detail-row"><span>Bikes disabled</span><span>${props.bikes_disabled}</span></div>
						<div class="detail-row"><span>Docks disabled</span><span>${props.docks_disabled}</span></div>
						<div class="detail-row"><span>Renting</span><span>${props.is_renting === "true" ? "✅ Yes" : "❌ No"}</span></div>
						<div class="detail-row"><span>Returning</span><span>${props.is_returning === "true" ? "✅ Yes" : "❌ No"}</span></div>
					</div>
				`;

				if (isMobile()) panel.classList.add("open");
				highlightSelected();
			}

			function showVeoBike(props) {
				selectedId = props.bike_id;
				selectedSystem = "veoride";
				panelClose.style.display = "block";
				panelEmpty.style.display = "none";
				panelContent.style.display = "block";

				const rangeMi = props.current_range_meters > 0
					? (props.current_range_meters / 1609.34).toFixed(1) + " mi"
					: "—";

				panelName.textContent = "VeoRide E-Bike";
				panelId.innerHTML = `#${props.bike_id.slice(0, 8)}… <span class="panel-badge veoride">VeoRide</span>`;

				const typeLabel = props.vehicle_type_id === "4" ? "⚡ E-Bike" : "🚲 Bike";
				const statusLabel = props.is_disabled === "true"
					? "❌ Disabled"
					: props.is_reserved === "true"
					? "🔒 Reserved"
					: "✅ Available";

				panelContent.innerHTML = `
					<div class="stat-grid">
						<div class="stat-card">
							<div class="stat-label">Range</div>
							<div class="stat-value purple" style="font-size:18px">${rangeMi}</div>
						</div>
						<div class="stat-card">
							<div class="stat-label">Type</div>
							<div class="stat-value" style="font-size:18px">${typeLabel}</div>
						</div>
					</div>
					<div>
						<div class="detail-row"><span>Status</span><span>${statusLabel}</span></div>
						<div class="detail-row"><span>Bike ID</span><span style="font-size:10px;word-break:break-all">${props.bike_id}</span></div>
					</div>
				`;

				if (isMobile()) panel.classList.add("open");
				highlightSelected();
			}

			function closePanel() {
				selectedId = null;
				selectedSystem = null;
				panelClose.style.display = "none";
				panelEmpty.style.display = "block";
				panelContent.style.display = "none";
				panelName.textContent = isMobile() ? "Tap a station" : "";
				panelId.textContent = "";
				panel.classList.remove("open");
				highlightSelected();
			}

			function highlightSelected() {
				if (!map.getSource("stations")) return;

				// Metro highlight
				map.setPaintProperty("station-circles", "circle-color", [
					"case",
					["==", ["get", "station_id"], selectedSystem === "metro" ? selectedId ?? "" : ""],
					"#0F6E56",
					"#1D9E75"
				]);
				map.setPaintProperty("station-circles", "circle-radius", [
					"case",
					["==", ["get", "station_id"], selectedSystem === "metro" ? selectedId ?? "" : ""],
					9,
					6
				]);

				// VeoRide highlight
				if (map.getSource("veo-bikes")) {
					map.setPaintProperty("veo-circles", "circle-color", [
						"case",
						["==", ["get", "bike_id"], selectedSystem === "veoride" ? selectedId ?? "" : ""],
						"#3340C0",
						[
							"case",
							["==", ["get", "is_disabled"], "true"], "#aaa",
							["==", ["get", "is_reserved"], "true"], "#9BA3F5",
							"#5B67E8"
						]
					]);
					map.setPaintProperty("veo-circles", "circle-radius", [
						"case",
						["==", ["get", "bike_id"], selectedSystem === "veoride" ? selectedId ?? "" : ""],
						9,
						5
					]);
				}
			}

			const map = new maplibregl.Map({
				container: "map",
				style: "https://tiles.versatiles.org/assets/styles/colorful/style.json",
				center: [-118.25, 34.05],
				zoom: 11
			});

			map.on("load", () => {
				// ── Metro Bike Share (stations) ──
				map.addSource("stations", {
					type: "geojson",
					data: { type: "FeatureCollection", features: [] }
				});
				map.addLayer({
					id: "station-circles",
					type: "circle",
					source: "stations",
					paint: {
						"circle-radius": 6,
						"circle-color": "#1D9E75",
						"circle-stroke-width": 2,
						"circle-stroke-color": "#ffffff"
					}
				});

				// ── VeoRide (free-floating bikes) ──
				map.addSource("veo-bikes", {
					type: "geojson",
					data: { type: "FeatureCollection", features: [] }
				});
				map.addLayer({
					id: "veo-circles",
					type: "circle",
					source: "veo-bikes",
					paint: {
						"circle-radius": 5,
						"circle-color": [
							"case",
							["==", ["get", "is_disabled"], "true"], "#aaa",
							["==", ["get", "is_reserved"], "true"], "#9BA3F5",
							"#5B67E8"
						],
						"circle-stroke-width": 2,
						"circle-stroke-color": "#ffffff"
					}
				});

				// ── Click handlers ──
				map.on("click", "station-circles", (e) => {
					showMetroStation(e.features[0].properties);
				});
				map.on("click", "veo-circles", (e) => {
					showVeoBike(e.features[0].properties);
				});
				map.on("click", (e) => {
					const metro = map.queryRenderedFeatures(e.point, { layers: ["station-circles"] });
					const veo = map.queryRenderedFeatures(e.point, { layers: ["veo-circles"] });
					if (!metro.length && !veo.length) closePanel();
				});

				["station-circles", "veo-circles"].forEach((id) => {
					map.on("mouseenter", id, () => { map.getCanvas().style.cursor = "pointer"; });
					map.on("mouseleave", id, () => { map.getCanvas().style.cursor = ""; });
				});

				loadAll();
				setInterval(loadAll, 60000);
			});

			async function loadAll() {
				await Promise.all([loadMetro(), loadVeo()]);
			}

			async function loadMetro() {
				try {
					const [infoRes, statusRes] = await Promise.all([
						fetch("https://gbfs.bcycle.com/bcycle_lametro/station_information.json"),
						fetch("https://gbfs.bcycle.com/bcycle_lametro/station_status.json")
					]);

					const infoData = await infoRes.json();
					let statusMap = {};
					if (statusRes.ok) {
						const sd = await statusRes.json();
						for (const s of sd.data?.stations || []) statusMap[s.station_id] = s;
					}

					const stations = infoData.data?.stations || [];
					metroFeatures = stations
						.filter((s) => s.lat && s.lon)
						.map((s) => {
							const st = statusMap[s.station_id] || {};
							return {
								type: "Feature",
								geometry: { type: "Point", coordinates: [s.lon, s.lat] },
								properties: {
									station_id: s.station_id,
									name: s.name,
									capacity: s.capacity ?? "—",
									bikes: st.num_bikes_available ?? "—",
									docks: st.num_docks_available ?? "—",
									bikes_disabled: st.num_bikes_disabled ?? "—",
									docks_disabled: st.num_docks_disabled ?? "—",
									is_renting: String(st.is_renting ?? false),
									is_returning: String(st.is_returning ?? false)
								}
							};
						});

					if (map.getSource("stations")) {
						map.getSource("stations").setData({ type: "FeatureCollection", features: metroFeatures });
					}

					if (selectedSystem === "metro" && selectedId) {
						const match = metroFeatures.find((f) => f.properties.station_id === selectedId);
						if (match) showMetroStation(match.properties);
					}

					updateStatusBar(stations.length, null);
				} catch (err) {
					document.getElementById("status-bar").textContent = "Metro error: " + err.message;
				}
			}

			let veoCount = 0;

			async function loadVeo() {
				try {
					const res = await fetch("https://cluster-prod.veoride.com/api/shares/name/xla/gbfs/free_bike_status");
					const data = await res.json();
					const bikes = data.data?.bikes || [];
					veoCount = bikes.length;

					veoFeatures = bikes
						.filter((b) => b.lat && b.lon)
						.map((b) => ({
							type: "Feature",
							geometry: { type: "Point", coordinates: [b.lon, b.lat] },
							properties: {
								bike_id: b.bike_id,
								is_reserved: String(b.is_reserved),
								is_disabled: String(b.is_disabled),
								vehicle_type_id: String(b.vehicle_type_id),
								current_range_meters: b.current_range_meters ?? 0
							}
						}));

					if (map.getSource("veo-bikes")) {
						map.getSource("veo-bikes").setData({ type: "FeatureCollection", features: veoFeatures });
					}

					if (selectedSystem === "veoride" && selectedId) {
						const match = veoFeatures.find((f) => f.properties.bike_id === selectedId);
						if (match) showVeoBike(match.properties);
					}

					updateStatusBar(null, bikes.length);
				} catch (err) {
					console.warn("VeoRide load error:", err.message);
				}
			}

			let metroCount = 0;
			function updateStatusBar(metro, veo) {
				if (metro !== null) metroCount = metro;
				if (veo !== null) veoCount = veo;
				document.getElementById("status-bar").textContent =
					`Metro: ${metroCount} stations · VeoRide: ${veoCount} bikes · updates every 60s`;
				highlightSelected();
			}
		</script>
	</body>
</html>
