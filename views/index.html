<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VeloCity — Bike Share Data Explorer</title>
		<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
		<link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }

			html, body { height: 100%; font-family: sans-serif; overflow: hidden; background: #fff; }

			#app { display: flex; flex-direction: column; height: 100vh; }

			/* ── Header ── */
			#header {
				padding: 10px 16px 8px;
				border-bottom: 1px solid #e8e8e8;
				flex-shrink: 0;
				display: flex;
				align-items: center;
				gap: 10px;
				flex-wrap: wrap;
			}
			#header h1 { font-size: 20px; font-weight: 700; }
			#header p { font-size: 13px; color: #999; }

			/* ── Legend ── */
			#legend { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
			.legend-item {
				display: flex; align-items: center; gap: 5px;
				font-size: 12px; color: #555; cursor: pointer; user-select: none;
			}
			.legend-dot {
				width: 11px; height: 11px; border-radius: 50%;
				border: 2px solid rgba(0,0,0,0.12); flex-shrink: 0; transition: opacity 0.2s;
			}
			.legend-item.hidden .legend-dot { opacity: 0.3; }
			.legend-item.hidden span { color: #ccc; }

			/* ── Body ── */
			#body { display: flex; flex: 1; overflow: hidden; }

			#sidepanel {
				width: 280px; flex-shrink: 0;
				border-right: 1px solid #e8e8e8;
				display: flex; flex-direction: column;
				background: #fff; overflow: hidden;
			}

			#map { flex: 1; height: 100%; }

			/* ── Panel header ── */
			#panel-header {
				padding: 14px 14px 10px;
				border-bottom: 1px solid #f0f0f0;
				display: none; align-items: flex-start; gap: 8px;
			}
			#panel-header-text { flex: 1; min-width: 0; }
			#panel-name { font-size: 14px; font-weight: 600; word-break: break-word; line-height: 1.3; color: #111; }
			#panel-id { font-size: 11px; color: #bbb; margin-top: 2px; }

			.panel-badge {
				display: inline-block; font-size: 10px; font-weight: 600;
				padding: 2px 6px; border-radius: 4px; margin-top: 4px;
				text-transform: uppercase; letter-spacing: 0.4px;
			}
			.badge-metro  { background: #e8f7f2; color: #1D9E75; }
			.badge-veoride { background: #eef0ff; color: #5B67E8; }
			.badge-spin   { background: #fff4e8; color: #E07B2A; }
			.badge-bird   { background: #f0e8ff; color: #8B3DC8; }

			#panel-close {
				background: none; border: none; cursor: pointer;
				font-size: 17px; color: #bbb; padding: 0; line-height: 1; flex-shrink: 0;
			}
			#panel-close:hover { color: #444; }

			#panel-body { padding: 14px; overflow-y: auto; flex: 1; }

			#panel-empty {
				padding: 40px 16px; text-align: center;
				color: #ccc; font-size: 13px; line-height: 1.6;
			}
			#panel-empty .icon { font-size: 30px; margin-bottom: 8px; }

			.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
			.stat-card { background: #f7f9f8; border-radius: 8px; padding: 10px 12px; }
			.stat-label { font-size: 10px; color: #999; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
			.stat-value { font-size: 22px; font-weight: 700; color: #1d9e75; }

			.detail-row {
				display: flex; justify-content: space-between; align-items: center;
				font-size: 12px; padding: 7px 0; border-bottom: 1px solid #f4f4f4; color: #777;
			}
			.detail-row:last-child { border-bottom: none; }
			.detail-row span:last-child { font-weight: 500; color: #222; }

			#status-bar {
				padding: 5px 12px; font-size: 11px; color: #bbb;
				border-top: 1px solid #f0f0f0; flex-shrink: 0;
				white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
			}

			/* ── Mobile ── */
			@media (max-width: 640px) {
				#body { flex-direction: column; }
				#sidepanel {
					width: 100%; border-right: none; border-top: 1px solid #e8e8e8;
					height: 48px; transition: height 0.3s ease; flex-shrink: 0; order: 2;
				}
				#sidepanel.open { height: 52vh; }
				#map { order: 1; flex: 1; height: auto; }
				#panel-header { padding: 10px 14px 8px !important; cursor: pointer; }
				#panel-header::before {
					content: ""; display: block; width: 36px; height: 4px;
					background: #ddd; border-radius: 2px; margin: 0 auto 8px; flex-shrink: 0;
				}
				#panel-header { flex-direction: column; display: flex !important; }
				#panel-header-inner { display: flex; align-items: flex-start; gap: 8px; width: 100%; }
				#panel-body { display: none; }
				#sidepanel.open #panel-body { display: block; }
				#status-bar { display: none; }
				#sidepanel.open #status-bar { display: block; }
				#legend { justify-content: flex-start; }
			}
		</style>
	</head>
	<body>
		<div id="app">
			<div id="header">
				<h1>VeloCity</h1>
				<p>LA Bike Share</p>
				<div id="legend">
					<div class="legend-item" id="toggle-metro" onclick="toggleLayer('metro')">
						<div class="legend-dot" style="background:#1D9E75;"></div><span>LA Metro</span>
					</div>
					<div class="legend-item" id="toggle-veoride" onclick="toggleLayer('veoride')">
						<div class="legend-dot" style="background:#5B67E8;"></div><span>VeoRide</span>
					</div>
					<div class="legend-item" id="toggle-spin" onclick="toggleLayer('spin')">
						<div class="legend-dot" style="background:#E07B2A;"></div><span>Spin</span>
					</div>
					<div class="legend-item" id="toggle-bird" onclick="toggleLayer('bird')">
						<div class="legend-dot" style="background:#8B3DC8;"></div><span>Bird</span>
					</div>
				</div>
			</div>
			<div id="body">
				<div id="sidepanel">
					<div id="panel-header">
						<div id="panel-header-inner" style="display:flex;align-items:flex-start;gap:8px;width:100%">
							<div id="panel-header-text" style="flex:1;min-width:0">
								<div id="panel-name">Tap a station</div>
								<div id="panel-id"></div>
							</div>
							<button id="panel-close" title="Close" style="display:none">✕</button>
						</div>
					</div>
					<div id="panel-body">
						<div id="panel-empty">
							<div class="icon">🚲</div>
							Click a vehicle or station<br>on the map to see details
						</div>
						<div id="panel-content" style="display:none"></div>
					</div>
					<div id="status-bar">Loading…</div>
				</div>
				<div id="map"></div>
			</div>
		</div>

		<script>
			const isMobile = () => window.innerWidth <= 640;

			const panel      = document.getElementById('sidepanel');
			const panelHeader = document.getElementById('panel-header');
			const panelClose  = document.getElementById('panel-close');
			const panelEmpty  = document.getElementById('panel-empty');
			const panelContent = document.getElementById('panel-content');
			const panelName   = document.getElementById('panel-name');
			const panelId     = document.getElementById('panel-id');

			panelHeader.addEventListener('click', e => {
				if (!isMobile() || e.target === panelClose) return;
				panel.classList.toggle('open');
			});
			panelClose.addEventListener('click', e => { e.stopPropagation(); closePanel(); });

			let selectedId = null, selectedSystem = null;

			const layerVisible = { metro: true, veoride: true, spin: true, bird: true };

			function toggleLayer(sys) {
				layerVisible[sys] = !layerVisible[sys];
				document.getElementById('toggle-' + sys).classList.toggle('hidden', !layerVisible[sys]);
				const ids = { metro: ['station-circles'], veoride: ['veo-circles'], spin: ['spin-circles'], bird: ['bird-circles'] };
				for (const lid of ids[sys]) {
					if (map.getLayer(lid)) map.setLayoutProperty(lid, 'visibility', layerVisible[sys] ? 'visible' : 'none');
				}
			}

			// ── Bird vehicle type map (fetched at load) ──
			const birdVehicleTypes = {};

			// ── Panel helpers ──
			function openPanel(name, idHtml, contentHtml) {
				panelClose.style.display = 'block';
				panelEmpty.style.display = 'none';
				panelContent.style.display = 'block';
				panelName.textContent = name;
				panelId.innerHTML = idHtml;
				panelContent.innerHTML = contentHtml;
				if (isMobile()) panel.classList.add('open');
				highlightSelected();
			}

			function closePanel() {
				selectedId = null; selectedSystem = null;
				panelClose.style.display = 'none';
				panelEmpty.style.display = 'block';
				panelContent.style.display = 'none';
				panelName.textContent = isMobile() ? 'Tap a vehicle' : '';
				panelId.textContent = '';
				panel.classList.remove('open');
				highlightSelected();
			}

			function rangeMi(meters) {
				return meters > 0 ? (meters / 1609.34).toFixed(1) + ' mi' : '—';
			}

			function battPct(pct) {
				if (pct == null || pct < 0) return '—';
				const p = Math.round(pct * 100);
				const emoji = p >= 70 ? '🟢' : p >= 30 ? '🟡' : '🔴';
				return emoji + ' ' + p + '%';
			}

			function availLabel(is_disabled, is_reserved) {
				if (is_disabled === 'true') return '❌ Disabled';
				if (is_reserved === 'true') return '🔒 Reserved';
				return '✅ Available';
			}

			// ── Show functions ──
			function showMetroStation(p) {
				selectedId = p.station_id; selectedSystem = 'metro';
				openPanel(p.name,
					`ID: ${p.station_id} <span class="panel-badge badge-metro">Metro Bike</span>`,
					`<div class="stat-grid">
						<div class="stat-card"><div class="stat-label">Bikes</div><div class="stat-value" style="color:#1D9E75">${p.bikes}</div></div>
						<div class="stat-card"><div class="stat-label">Docks</div><div class="stat-value" style="color:#378add">${p.docks}</div></div>
					</div>
					<div>
						<div class="detail-row"><span>Capacity</span><span>${p.capacity}</span></div>
						<div class="detail-row"><span>Bikes disabled</span><span>${p.bikes_disabled}</span></div>
						<div class="detail-row"><span>Docks disabled</span><span>${p.docks_disabled}</span></div>
						<div class="detail-row"><span>Renting</span><span>${p.is_renting === 'true' ? '✅ Yes' : '❌ No'}</span></div>
						<div class="detail-row"><span>Returning</span><span>${p.is_returning === 'true' ? '✅ Yes' : '❌ No'}</span></div>
					</div>`
				);
			}

			function showVeoBike(p) {
				selectedId = p.bike_id; selectedSystem = 'veoride';
				const typeLabel = p.vehicle_type_id === '4' ? '⚡ E-Bike' : '🚲 Bike';
				openPanel('VeoRide E-Bike',
					`#${p.bike_id.slice(0,8)}… <span class="panel-badge badge-veoride">VeoRide</span>`,
					`<div class="stat-grid">
						<div class="stat-card"><div class="stat-label">Range</div><div class="stat-value" style="color:#5B67E8;font-size:18px">${rangeMi(+p.current_range_meters)}</div></div>
						<div class="stat-card"><div class="stat-label">Type</div><div class="stat-value" style="font-size:16px">${typeLabel}</div></div>
					</div>
					<div>
						<div class="detail-row"><span>Status</span><span>${availLabel(p.is_disabled, p.is_reserved)}</span></div>
					</div>`
				);
			}

			function showSpinBike(p) {
				selectedId = p.bike_id; selectedSystem = 'spin';
				const typeLabel = p.form_factor === 'scooter' ? '🛴 Scooter' : p.form_factor === 'bicycle' ? '🚲 Bike' : '⚡ E-Bike';
				openPanel('Spin Vehicle',
					`#${p.bike_id.slice(0,8)}… <span class="panel-badge badge-spin">Spin</span>`,
					`<div class="stat-grid">
						<div class="stat-card"><div class="stat-label">Range</div><div class="stat-value" style="color:#E07B2A;font-size:18px">${rangeMi(+p.current_range_meters)}</div></div>
						<div class="stat-card"><div class="stat-label">Battery</div><div class="stat-value" style="font-size:14px;padding-top:4px">${battPct(+p.current_fuel_percent)}</div></div>
					</div>
					<div>
						<div class="detail-row"><span>Type</span><span>${typeLabel}</span></div>
						<div class="detail-row"><span>Status</span><span>${availLabel(p.is_disabled, p.is_reserved)}</span></div>
					</div>`
				);
			}

			function showBirdBike(p) {
				selectedId = p.bike_id; selectedSystem = 'bird';
				const vt = birdVehicleTypes[p.vehicle_type_id] || {};
				const typeLabel = vt.form_factor === 'scooter' ? '🛴 Scooter' : vt.form_factor === 'bicycle' ? '🚲 Bike' : '⚡ E-Bike';
				openPanel('Bird Vehicle',
					`#${p.bike_id.slice(0,8)}… <span class="panel-badge badge-bird">Bird</span>`,
					`<div class="stat-grid">
						<div class="stat-card"><div class="stat-label">Range</div><div class="stat-value" style="color:#8B3DC8;font-size:18px">${rangeMi(+p.current_range_meters)}</div></div>
						<div class="stat-card"><div class="stat-label">Battery</div><div class="stat-value" style="font-size:14px;padding-top:4px">${battPct(+p.current_fuel_percent)}</div></div>
					</div>
					<div>
						<div class="detail-row"><span>Type</span><span>${typeLabel}</span></div>
						<div class="detail-row"><span>Status</span><span>${availLabel(p.is_disabled, p.is_reserved)}</span></div>
					</div>`
				);
			}

			// ── Highlight ──
			function highlightSelected() {
				const layers = [
					{ id: 'station-circles', sys: 'metro',   key: 'station_id', baseColor: '#1D9E75', selColor: '#0F6E56', baseR: 6, selR: 9 },
					{ id: 'veo-circles',     sys: 'veoride', key: 'bike_id',    baseColor: null,      selColor: '#3340C0', baseR: 5, selR: 9 },
					{ id: 'spin-circles',    sys: 'spin',    key: 'bike_id',    baseColor: null,      selColor: '#9D4E0F', baseR: 5, selR: 9 },
					{ id: 'bird-circles',    sys: 'bird',    key: 'bike_id',    baseColor: null,      selColor: '#5A1E8A', baseR: 5, selR: 9 },
				];
				for (const l of layers) {
					if (!map.getLayer(l.id)) continue;
					const matchId = selectedSystem === l.sys ? (selectedId ?? '') : '';
					// radius
					map.setPaintProperty(l.id, 'circle-radius', ['case', ['==', ['get', l.key], matchId], l.selR, l.baseR]);
					// color — for veo/spin/bird we preserve per-feature status coloring
					if (l.baseColor) {
						map.setPaintProperty(l.id, 'circle-color', ['case', ['==', ['get', l.key], matchId], l.selColor, l.baseColor]);
					} else {
						// inject selection highlight on top of status expression
						const statusExpr = statusColorExpr(l.sys);
						map.setPaintProperty(l.id, 'circle-color', ['case', ['==', ['get', l.key], matchId], l.selColor, statusExpr]);
					}
				}
			}

			function statusColorExpr(sys) {
				const colors = { veoride: ['#aaa', '#9BA3F5', '#5B67E8'], spin: ['#aaa', '#F5C49B', '#E07B2A'], bird: ['#aaa', '#D4A8F0', '#8B3DC8'] };
				const [dis, res, avail] = colors[sys];
				return ['case', ['==', ['get', 'is_disabled'], 'true'], dis, ['==', ['get', 'is_reserved'], 'true'], res, avail];
			}

			// ── Map ──
			const map = new maplibregl.Map({
				container: 'map',
				style: 'https://tiles.versatiles.org/assets/styles/colorful/style.json',
				center: [-118.28, 34.03],
				zoom: 11
			});

			map.on('load', async () => {
				// Fetch Bird vehicle types
				try {
					const vtRes = await fetch('https://mds.bird.co/gbfs/v2/public/los-angeles/vehicle_types.json');
					const vtData = await vtRes.json();
					for (const vt of vtData.data?.vehicle_types || []) birdVehicleTypes[vt.vehicle_type_id] = vt;
				} catch(e) { console.warn('Bird vehicle types:', e.message); }

				// ── Sources & Layers ──
				const systems = [
					{ id: 'stations',   layer: 'station-circles', color: '#1D9E75', radius: 6 },
					{ id: 'veo-bikes',  layer: 'veo-circles',     color: null,      radius: 5 },
					{ id: 'spin-bikes', layer: 'spin-circles',    color: null,      radius: 5 },
					{ id: 'bird-bikes', layer: 'bird-circles',    color: null,      radius: 5 },
				];
				for (const s of systems) {
					map.addSource(s.id, { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
					map.addLayer({
						id: s.layer, type: 'circle', source: s.id,
						paint: {
							'circle-radius': s.radius,
							'circle-color': s.color ?? '#aaa',
							'circle-stroke-width': 2,
							'circle-stroke-color': '#ffffff'
						}
					});
				}

				// ── Click handlers ──
				const handlers = {
					'station-circles': (p) => showMetroStation(p),
					'veo-circles':     (p) => showVeoBike(p),
					'spin-circles':    (p) => showSpinBike(p),
					'bird-circles':    (p) => showBirdBike(p),
				};
				for (const [lid, fn] of Object.entries(handlers)) {
					map.on('click', lid, e => fn(e.features[0].properties));
					map.on('mouseenter', lid, () => { map.getCanvas().style.cursor = 'pointer'; });
					map.on('mouseleave', lid, () => { map.getCanvas().style.cursor = ''; });
				}
				map.on('click', e => {
					const hits = Object.keys(handlers).some(lid => map.queryRenderedFeatures(e.point, { layers: [lid] }).length);
					if (!hits) closePanel();
				});

				loadAll();
				setInterval(loadAll, 60000);
			});

			// ── Counts ──
			const counts = { metro: 0, veoride: 0, spin: 0, bird: 0 };

			function updateStatus() {
				document.getElementById('status-bar').textContent =
					`Metro: ${counts.metro} stations · VeoRide: ${counts.veoride} · Spin: ${counts.spin} · Bird: ${counts.bird} · updates every 60s`;
			}

			async function loadAll() {
				await Promise.all([loadMetro(), loadVeoRide(), loadSpin(), loadBird()]);
			}

			// ── Metro ──
			let selectedMetroProps = null;
			async function loadMetro() {
				try {
					const [infoRes, statusRes] = await Promise.all([
						fetch('https://gbfs.bcycle.com/bcycle_lametro/station_information.json'),
						fetch('https://gbfs.bcycle.com/bcycle_lametro/station_status.json')
					]);
					const infoData = await infoRes.json();
					const statusMap = {};
					if (statusRes.ok) {
						const sd = await statusRes.json();
						for (const s of sd.data?.stations || []) statusMap[s.station_id] = s;
					}
					const stations = infoData.data?.stations || [];
					counts.metro = stations.length;
					const features = stations.filter(s => s.lat && s.lon).map(s => {
						const st = statusMap[s.station_id] || {};
						return {
							type: 'Feature',
							geometry: { type: 'Point', coordinates: [s.lon, s.lat] },
							properties: {
								station_id: s.station_id, name: s.name,
								capacity: s.capacity ?? '—',
								bikes: st.num_bikes_available ?? '—',
								docks: st.num_docks_available ?? '—',
								bikes_disabled: st.num_bikes_disabled ?? '—',
								docks_disabled: st.num_docks_disabled ?? '—',
								is_renting: String(st.is_renting ?? false),
								is_returning: String(st.is_returning ?? false)
							}
						};
					});
					map.getSource('stations').setData({ type: 'FeatureCollection', features });
					if (selectedSystem === 'metro' && selectedId) {
						const m = features.find(f => f.properties.station_id === selectedId);
						if (m) showMetroStation(m.properties);
					}
					updateStatus(); highlightSelected();
				} catch(e) { console.warn('Metro:', e.message); }
			}

			// ── VeoRide ──
			async function loadVeoRide() {
				try {
					const res = await fetch('https://cluster-prod.veoride.com/api/shares/name/xla/gbfs/free_bike_status');
					const data = await res.json();
					const bikes = data.data?.bikes || [];
					counts.veoride = bikes.length;
					const features = bikes.filter(b => b.lat && b.lon).map(b => ({
						type: 'Feature',
						geometry: { type: 'Point', coordinates: [b.lon, b.lat] },
						properties: {
							bike_id: b.bike_id,
							is_reserved: String(b.is_reserved),
							is_disabled: String(b.is_disabled),
							vehicle_type_id: String(b.vehicle_type_id),
							current_range_meters: b.current_range_meters ?? 0
						}
					}));
					map.getSource('veo-bikes').setData({ type: 'FeatureCollection', features });
					// re-apply status colors
					map.setPaintProperty('veo-circles', 'circle-color', statusColorExpr('veoride'));
					if (selectedSystem === 'veoride' && selectedId) {
						const m = features.find(f => f.properties.bike_id === selectedId);
						if (m) showVeoBike(m.properties);
					}
					updateStatus(); highlightSelected();
				} catch(e) { console.warn('VeoRide:', e.message); }
			}

			// ── Spin ──
			async function loadSpin() {
				try {
					const res = await fetch('https://gbfs.spin.pm/api/gbfs/v2_3/los_angeles/free_bike_status');
					const data = await res.json();
					const bikes = data.data?.bikes || [];
					counts.spin = bikes.length;

					// We need vehicle_types to get form_factor
					let spinVehicleTypes = {};
					try {
						const vtRes = await fetch('https://gbfs.spin.pm/api/gbfs/v2_3/los_angeles/vehicle_types');
						const vtData = await vtRes.json();
						for (const vt of vtData.data?.vehicle_types || []) spinVehicleTypes[vt.vehicle_type_id] = vt;
					} catch(_) {}

					const features = bikes.filter(b => b.lat && b.lon).map(b => {
						const vt = spinVehicleTypes[b.vehicle_type_id] || {};
						return {
							type: 'Feature',
							geometry: { type: 'Point', coordinates: [b.lon, b.lat] },
							properties: {
								bike_id: b.bike_id,
								is_reserved: String(b.is_reserved),
								is_disabled: String(b.is_disabled),
								form_factor: vt.form_factor || 'bicycle',
								current_range_meters: b.current_range_meters ?? 0,
								current_fuel_percent: b.current_fuel_percent ?? -1
							}
						};
					});
					map.getSource('spin-bikes').setData({ type: 'FeatureCollection', features });
					map.setPaintProperty('spin-circles', 'circle-color', statusColorExpr('spin'));
					if (selectedSystem === 'spin' && selectedId) {
						const m = features.find(f => f.properties.bike_id === selectedId);
						if (m) showSpinBike(m.properties);
					}
					updateStatus(); highlightSelected();
				} catch(e) { console.warn('Spin:', e.message); }
			}

			// ── Bird ──
			async function loadBird() {
				try {
					const res = await fetch('https://mds.bird.co/gbfs/v2/public/los-angeles/free_bike_status.json');
					const data = await res.json();
					const bikes = data.data?.bikes || [];
					counts.bird = bikes.length;
					const features = bikes.filter(b => b.lat && b.lon).map(b => ({
						type: 'Feature',
						geometry: { type: 'Point', coordinates: [b.lon, b.lat] },
						properties: {
							bike_id: b.bike_id,
							is_reserved: String(b.is_reserved),
							is_disabled: String(b.is_disabled),
							vehicle_type_id: b.vehicle_type_id,
							current_range_meters: b.current_range_meters ?? 0,
							current_fuel_percent: b.current_fuel_percent ?? -1
						}
					}));
					map.getSource('bird-bikes').setData({ type: 'FeatureCollection', features });
					map.setPaintProperty('bird-circles', 'circle-color', statusColorExpr('bird'));
					if (selectedSystem === 'bird' && selectedId) {
						const m = features.find(f => f.properties.bike_id === selectedId);
						if (m) showBirdBike(m.properties);
					}
					updateStatus(); highlightSelected();
				} catch(e) { console.warn('Bird:', e.message); }
			}
		</script>
	</body>
</html>
